<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Data Types Examples</h2>
    <script type="text/JavaScript">
        var a;
        var m=100;
        var n=100.20;
        var fname="Ravi Kumar";
        var result=true;
        var obj=new Date();
        document.write("the value of a is " + a)
        document.write("<br>the value of m is " + m)
        document.write("<br>the value of n is " + n)
        document.write("<br>the value of fname is " + fname)
        document.write("<br>the value of result is " + result)
        document.write("<br>the value of obj is " + obj)
        var x;
        document.write("<br>the value of x is " + x)
        document.write("<br>the type of x is " + typeof(x))
        x=100;
        document.write("<br>the value of x is " + x)
        document.write("<br>the type of x is " + typeof(x))
        x=100.100;
        document.write("<br>the value of x is " + x)
        document.write("<br>the type of x is " + typeof(x))
        x="Ravi Kumar";
        document.write("<br>the value of x is " + x)
        document.write("<br>the type of x is " + typeof(x))
        x=true;
        document.write("<br>the value of x is " + x)    
        document.write("<br>the type of x is " + typeof(x))
        x=new Date();
        document.write("<br>the value of x is " + x)
        document.write("<br>the type of x is " + typeof(x))
    </script>
</body>
</html>
