<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/JavaScript"> 
        function hello() {
            alert("User defined function called!");            
        }
        hello();  //Call the function to execute it
        function add(a,b) {
            var sum = a + b;
            alert("The sum of " + a + " and " + b + " is: " + sum);
        }
        add(100,200);  //Call the function with arguments
        function sayHello(name){
            //do some coding
            return "Welcome user "+name;
        }
        var result = sayHello("John");
        alert(result);
    </script>
</body>
</html>
