<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Operator Examples</h2>
    <script type="text/JavaScript">
        var a=10;  //number type consider
        var b="10";  //string type consider
        document.write("== equals <br>");
        document.write(a==b); //true,because ==checks for value only
        document.write("<br>=== equals <br>");
        document.write(a===b); //false,because ===checks for value and type
    </script>
</body>
</html>
